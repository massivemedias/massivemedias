    <!-- Anti-FOUC: applique le thème avant le rendu -->
    <script>
      (function() {
        try {
          var colors = ['#3D0079','#0C1E3A','#0D3040','#0B2818','#2E0A1A','#2A1A10','#1E100A','#1A1A28','#2D3748','#E8E0D8','#FFFFFF'];
          var s = localStorage.getItem('massive-theme-step');
          var step = s !== null ? Number(s) : 0;
          if (isNaN(step) || step < 0 || step > 10) step = 0;
          if (s === null) {
            var b = localStorage.getItem('massive-brightness');
            if (b !== null) step = Math.round((Number(b) / 100) * 9);
          }
          if (step <= 8) document.documentElement.setAttribute('data-theme', 'vibrant');
          else document.documentElement.removeAttribute('data-theme');
          var meta = document.querySelector('meta[name="theme-color"]');
          if (meta) meta.setAttribute('content', colors[step]);
          // Appliquer bg-body et bg-header immediatement pour eviter le flash mauve
          var c = colors[step];
          document.documentElement.style.setProperty('--bg-body', c);
          document.documentElement.style.setProperty('--bg-header', c + 'f5');
          document.documentElement.style.backgroundColor = c;
        } catch(e) {}
      })();
    </script>
