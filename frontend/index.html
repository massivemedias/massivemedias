    <!-- SPA redirect: decode path from 404.html -->
    <script>
      (function(l) {
        if (l.search[1] === '/') {
          var decoded = l.search.slice(1).split('&').map(function(s) {
            return s.replace(/~and~/g, '&')
          }).join('?');
          window.history.replaceState(null, null, l.pathname.slice(0, -1) + decoded + l.hash);
        }
      }(window.location));
    </script>

    <!-- Anti-FOUC: applique le thème avant le rendu -->
    <script>
      (function() {
        try {
          var s = localStorage.getItem('massive-theme-step');
          if (s !== null && Number(s) <= 7) {
            document.documentElement.setAttribute('data-theme', 'vibrant');
          } else if (s === null) {
            var b = localStorage.getItem('massive-brightness');
            if (b !== null && Number(b) < 88) {
              document.documentElement.setAttribute('data-theme', 'vibrant');
            }
          }
        } catch(e) {}
      })();
    </script>
