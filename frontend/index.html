    <!-- META-MOBILE-WEB-APP (12 mai 2026) : "mobile-web-app-capable" est le
         standard moderne (Chrome/Edge/Firefox/Safari iOS 13+). On garde
         l'ancien apple-mobile-web-app-capable pour retrocompat iOS <13. -->
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />

    <!-- Preconnect pour fonts Google (réduit latence DNS+TLS) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <!-- Préchargement de la font Space Grotesk -->
    <link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap" />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Montserrat:ital,wght@1,800;1,900&family=Caveat:wght@600&display=swap" />

    <!-- LCP-OPTIMIZE (8 mai 2026) : preload de l'image hero "Create.Print.Repeat"
         qui est le LCP de la page d'accueil. Sans preload, le browser ne
         decouvre cette image qu'apres parse + execution du JS React (delay
         400-800ms). Avec preload, telechargement parallele au JS = gain
         LCP ~200-400ms = +5-10 points PageSpeed mobile.
         Note: ne preload QUE pour la home (le tagline n'est pas sur les
         autres pages). Cloudflare honore Link headers en HTTP/2 push aussi. -->
    <link rel="preload" as="image" href="/images/cpr-tagline.png" fetchpriority="high" />

    <!-- STICKERS-HERO-PERF (PERF-01, 12 juillet 2026) : le sticker vedette du
         hero /stickers est choisi AVANT le paint par ce mini-script (avant le
         bundle module). Il tire un index aleatoire dans HERO_POOL, l'expose sur
         window, et precharge CETTE image. Le hero (MassiveStickers.jsx) lit le
         MEME index au mount -> il affiche exactement l'image prechargee : une
         seule image, chargee tot (LCP ~= FCP au lieu de +2s), ZERO swap, random
         par visite conserve. Gardes : no-op au prerender et hors /stickers
         (aucun preload inutile ailleurs). HERO_POOL = liste editable des
         designs vedettes (les slugs doivent exister dans le manifest). -->
    <script>
      (function () {
        if (window.__MASSIVE_PRERENDER__) return;
        var p = location.pathname;
        if (p !== '/stickers' && p !== '/stickers/') return;
        var POOL = [
          'massive-piece-verte', 'massive-skull-cervo', 'massive-tokyo',
          'massive-dj-skull', 'massive-samourai-violet', 'massive-alien-hot',
          'massive-chameleon', 'massive-jade', 'massive-fleur-degueu',
          'massive-art-de-rue', 'massive-biker', 'massive-basketball-man'
        ];
        window.__HERO_POOL__ = POOL;
        var i = Math.floor(Math.random() * POOL.length);
        window.__HERO_IDX__ = i;
        var l = document.createElement('link');
        l.rel = 'preload';
        l.as = 'image';
        l.href = '/images/stickers-massive/' + POOL[i] + '.webp';
        l.setAttribute('fetchpriority', 'high');
        document.head.appendChild(l);
      })();
    </script>

    <!-- Preconnect au backend Strapi pour les API calls hot path (site-content
         charge des le boot) - economise ~100ms sur le 1er fetch. -->

         montreal", "stickers", "prints", "fine art", "impression sur mesure".

    <!-- Anti-FOUC: applique le thème avant le rendu -->
    <script>
      (function() {
        try {
          var colors = ['#3D0079','#0C1E3A','#0D3040','#0B2818','#2E0A1A','#2A1A10','#1E100A','#1A1A28','#2D3748','#E8E0D8','#FFFFFF'];
          var s = localStorage.getItem('massive-theme-step');
          var step = s !== null ? Number(s) : 0;
          if (isNaN(step) || step < 0 || step > 10) step = 0;
          if (s === null) {
            var b = localStorage.getItem('massive-brightness');
            if (b !== null) step = Math.round((Number(b) / 100) * 9);
          }
          if (step <= 8) document.documentElement.setAttribute('data-theme', 'vibrant');
          else document.documentElement.removeAttribute('data-theme');
          var meta = document.querySelector('meta[name="theme-color"]');
          if (meta) meta.setAttribute('content', colors[step]);
          // Appliquer bg-body et bg-header immediatement pour eviter le flash mauve
          var c = colors[step];
          document.documentElement.style.setProperty('--bg-body', c);
          document.documentElement.style.setProperty('--bg-header', c + 'f5');
          document.documentElement.style.backgroundColor = c;
        } catch(e) {}
      })();
    </script>
