name: Keep Alive Render

on:
  schedule:
    # Ping toutes les 10 minutes pour eviter le sleep Render (15 min)
    - cron: '*/10 * * * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Strapi (3 tentatives espacees)
        run: |
          curl -fsS -o /dev/null -w "Ping 1: %{http_code}\n" https://massivemedias-api.onrender.com/api/site-contents || true
          sleep 120
          curl -fsS -o /dev/null -w "Ping 2: %{http_code}\n" https://massivemedias-api.onrender.com/api/site-contents || true
          sleep 120
          curl -fsS -o /dev/null -w "Ping 3: %{http_code}\n" https://massivemedias-api.onrender.com/api/site-contents || true
