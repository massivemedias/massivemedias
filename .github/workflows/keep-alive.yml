name: Keep Alive Render

on:
  schedule:
    # Ping toutes les 10 minutes pour eviter le sleep Render (15 min)
    - cron: '*/10 * * * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Strapi (3 tentatives espacees)
        run: |
          # Utilise /api/artists (endpoint valide, retourne 200 rapidement)
          # Note: GitHub Actions crons sont souvent delayes 20-60min. Le vrai
          # keep-alive est le Cloudflare Worker Cron (*/5 * * * *, fiable).
          # Ce workflow sert de double-filet au cas ou.
          curl -fsS -o /dev/null -w "Ping 1: %{http_code} in %{time_total}s\n" https://massivemedias-api.onrender.com/api/artists || true
          sleep 120
          curl -fsS -o /dev/null -w "Ping 2: %{http_code} in %{time_total}s\n" https://massivemedias-api.onrender.com/api/artists || true
          sleep 120
          curl -fsS -o /dev/null -w "Ping 3: %{http_code} in %{time_total}s\n" https://massivemedias-api.onrender.com/api/artists || true
