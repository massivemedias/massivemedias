name: Postgres Daily Backup

# BACKUP-01 : backup quotidien de la base Neon vers un bucket Cloudflare R2.
# Cout quasi-nul (R2 = 10 Go gratuits, zero egress fee). Rotation 30 jours.
#
# Secrets requis (Repo Settings > Secrets and variables > Actions) :
#   DATABASE_URL           - connection string Neon (prefer une user read-only)
#   R2_ACCESS_KEY_ID       - cle d'acces R2 (cf Cloudflare dashboard > R2 > Manage API tokens)
#   R2_SECRET_ACCESS_KEY   - secret associe
#   R2_BUCKET              - nom du bucket R2 (ex: massivemedias-backups)
#   R2_ENDPOINT            - endpoint S3 R2 (ex: https://<accountId>.r2.cloudflarestorage.com)
#
# Si un de ces secrets manque, le workflow skip avec un warning (exit 0) -
# pas d'alerte email. Une fois configure, le backup tourne tous les jours.
#
# Pour restaurer un backup:
#   aws s3 cp s3://$R2_BUCKET/backups/YYYY-MM-DD.sql.gz - \
#     --endpoint-url $R2_ENDPOINT | gunzip | psql $TARGET_DATABASE_URL

on:
  schedule:
    # 03:30 UTC = 23:30 Montreal (heure calme, pas en conflit avec reconcile-stripe 07:XX)
    - cron: '30 3 * * *'
  workflow_dispatch: {}

jobs:
  backup:
    runs-on: ubuntu-latest
    steps:
      - name: Verify secrets configured
        id: check-secrets
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_BUCKET: ${{ secrets.R2_BUCKET }}
          R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
        run: |
          # Skip silencieux si la config n'est pas encore posee - pas d'email
          # pendant qu'on met en place progressivement. Une fois les 5 secrets
          # ajoutes, le workflow demarre automatiquement.
          if [ -z "$DATABASE_URL" ] || [ -z "$R2_ACCESS_KEY_ID" ] || [ -z "$R2_SECRET_ACCESS_KEY" ] || [ -z "$R2_BUCKET" ] || [ -z "$R2_ENDPOINT" ]; then
            echo "::warning::Backup secrets not fully configured. Skipping this run."
            echo "To activate: add secrets DATABASE_URL, R2_ACCESS_KEY_ID, R2_SECRET_ACCESS_KEY, R2_BUCKET, R2_ENDPOINT to repo Settings > Secrets."
            echo "configured=false" >> $GITHUB_OUTPUT
            exit 0
          fi
          echo "configured=true" >> $GITHUB_OUTPUT

      - name: Install PostgreSQL client 17
        if: steps.check-secrets.outputs.configured == 'true'
        run: |
          # Neon tourne sur Postgres 17, donc pg_dump 17 minimum (sinon
          # pg_dump refuse de dumper une version superieure a la sienne).
          # Le package est dans le repo PGDG officiel.
          # On retire d'abord la version 16 pre-installee sinon le wrapper
          # /usr/bin/pg_dump pointe toujours sur la 16.
          sudo apt-get update
          sudo apt-get install -y curl ca-certificates gnupg gzip
          sudo install -d /usr/share/postgresql-common/pgdg
          sudo curl -fsSL \
            https://www.postgresql.org/media/keys/ACCC4CF8.asc \
            -o /usr/share/postgresql-common/pgdg/apt.postgresql.org.asc
          echo "deb [signed-by=/usr/share/postgresql-common/pgdg/apt.postgresql.org.asc] https://apt.postgresql.org/pub/repos/apt $(lsb_release -cs)-pgdg main" \
            | sudo tee /etc/apt/sources.list.d/pgdg.list
          sudo apt-get update
          sudo apt-get install -y postgresql-client-17
          # Chemin explicite vers la binary 17 (bypass le wrapper qui peut
          # resoudre vers la 16 si les 2 sont installees).
          echo "PG_DUMP=/usr/lib/postgresql/17/bin/pg_dump" >> $GITHUB_ENV
          /usr/lib/postgresql/17/bin/pg_dump --version

      - name: Dump database to compressed file
        if: steps.check-secrets.outputs.configured == 'true'
        id: dump
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          # pipefail : sans ca, un pg_dump qui echoue passe sous le radar car
          # `gzip > file` retourne 0 meme avec stdin vide. Ancien bug decouvert
          # au premier run BACKUP-01 -> fichier de 4KB contenant rien.
          set -eo pipefail

          STAMP=$(date -u +%Y-%m-%d)
          FILE="massivemedias-${STAMP}.sql.gz"
          echo "file=$FILE" >> $GITHUB_OUTPUT

          # --no-owner --no-privileges : backup portable entre environnements
          # (permet restore dans un Neon fresh sans conflicts d'ownership).
          # --format=plain + gzip = restore facile avec `gunzip | psql`.
          # -d = connection string explicite (plus robuste que positional arg
          # quand l'URL contient des & non quotes dans le YAML).
          "$PG_DUMP" \
            --no-owner \
            --no-privileges \
            --format=plain \
            -d "$DATABASE_URL" \
            | gzip -9 > "$FILE"

          SIZE=$(du -h "$FILE" | awk '{print $1}')
          BYTES=$(stat -c%s "$FILE")
          echo "Created $FILE ($SIZE / $BYTES bytes)"
          echo "size=$SIZE" >> $GITHUB_OUTPUT

          # Sanity check: un dump valide contient au minimum les directives
          # pg_dump de header (SET statement_timeout, CREATE TABLE, etc). On
          # verifie que le fichier decompresse fait au moins 500 bytes de SQL
          # reel -> protection contre dump vide malgre exit code 0.
          DECOMPRESSED_SIZE=$(gunzip -c "$FILE" | wc -c)
          echo "Decompressed size: $DECOMPRESSED_SIZE bytes"
          if [ "$DECOMPRESSED_SIZE" -lt 500 ]; then
            echo "::error::Backup looks empty (< 500 bytes decompressed). Aborting upload."
            exit 1
          fi

      - name: Upload to R2 (S3-compatible)
        if: steps.check-secrets.outputs.configured == 'true'
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: auto
          R2_BUCKET: ${{ secrets.R2_BUCKET }}
          R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
          FILE: ${{ steps.dump.outputs.file }}
        run: |
          # R2 est S3-compatible - AWS CLI marche tel quel avec --endpoint-url.
          # Pas besoin d'installer wrangler ou un client R2 specifique.
          aws s3 cp "$FILE" "s3://$R2_BUCKET/backups/$FILE" \
            --endpoint-url "$R2_ENDPOINT" \
            --no-progress
          echo "::notice::Backup uploaded: s3://$R2_BUCKET/backups/$FILE (${{ steps.dump.outputs.size }})"

      - name: "Rotate: delete backups older than 30 days"
        if: steps.check-secrets.outputs.configured == 'true'
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: auto
          R2_BUCKET: ${{ secrets.R2_BUCKET }}
          R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
        run: |
          # Retention 30 jours rolling. R2 offre aussi des lifecycle rules cote
          # bucket, mais on fait le cleanup ici pour que tout soit tracable dans
          # les logs du workflow (plus simple a auditer qu'une config bucket).
          CUTOFF=$(date -u -d '30 days ago' +%Y-%m-%d)
          echo "Cutoff: supprimer les backups anterieurs a $CUTOFF"

          aws s3 ls "s3://$R2_BUCKET/backups/" --endpoint-url "$R2_ENDPOINT" \
            | awk '{print $4}' \
            | while read -r key; do
              # Extraire la date du nom de fichier (format massivemedias-YYYY-MM-DD.sql.gz)
              FILE_DATE=$(echo "$key" | grep -oE '[0-9]{4}-[0-9]{2}-[0-9]{2}' || true)
              if [ -z "$FILE_DATE" ]; then continue; fi
              if [ "$FILE_DATE" \< "$CUTOFF" ]; then
                echo "Deleting old backup: $key (date: $FILE_DATE)"
                aws s3 rm "s3://$R2_BUCKET/backups/$key" --endpoint-url "$R2_ENDPOINT"
              fi
            done
          echo "Rotation complete."

      - name: Summary
        if: steps.check-secrets.outputs.configured == 'true'
        run: |
          echo "==============================="
          echo "Backup Postgres quotidien"
          echo "  fichier: ${{ steps.dump.outputs.file }}"
          echo "  taille:  ${{ steps.dump.outputs.size }}"
          echo "  bucket:  ${{ secrets.R2_BUCKET }}"
          echo "  retention: 30 jours rolling"
          echo "==============================="
